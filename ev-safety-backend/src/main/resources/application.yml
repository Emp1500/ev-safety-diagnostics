spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/evdiag}
    username: ${DB_USERNAME:evuser}
    password: ${DB_PASSWORD:evpass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mqtt:
  broker-url: ${MQTT_BROKER_URL:tcp://localhost:1883}
  client-id: ev-safety-backend
  topic: ev/+/telemetry

server:
  port: 8080

websocket:
  endpoint: /ws
  topic-prefix: /topic/live

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

logging:
  level:
    org.springframework.web.socket.config.annotation.WebSocketMessageBrokerStats: WARN
