version: '3.8'

services:

  postgres:
    image: postgres:16
    container_name: evdiag-postgres
    environment:
      POSTGRES_DB: evdiag
      POSTGRES_USER: evuser
      POSTGRES_PASSWORD: evpass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evuser -d evdiag"]
      interval: 5s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: evdiag-mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

volumes:
  pgdata:
